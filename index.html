<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>慧流一号水利设计商城</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            /* 背景图：确保文件名完全一致 */
            background: url('c01dc1f25bcbaca273b2d7678c2cf0a1.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: "Microsoft YaHei", sans-serif;
            min-height: 100vh;
        }
        .header {
            background: rgba(0, 74, 153, 0.85);
            color: white; text-align: center; padding: 30px;
            border-bottom: 4px solid #33cc33;
        }
        .container {
            display: flex; justify-content: center; padding: 60px 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px; width: 380px; padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-align: center;
        }
        .product-img {
            width: 100%; border-radius: 8px; border: 1px solid #ddd;
        }
        .price-text {
            color: #33cc33; font-size: 20px; font-weight: bold; margin: 15px 0;
        }
        .buy-btn {
            display: inline-block; background: #004a99; color: white;
            padding: 12px 30px; text-decoration: none; border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>慧流一号的水利设计商城</h1>
        <p>专业·精准·可靠的水利计量方案</p>
    </div>
    <div class="container">
        <div class="card">
            <img src="1ce64ef9b8ac77d85c8dda7e7444f3b5.jpg" class="product-img">
            <h3>标准巴歇尔计量槽</h3>
            <p>适用于明渠流量测量的经典明渠堰槽</p>
            <div class="price-text">工程洽谈</div>
            <a href="detail.html" class="buy-btn">查看产品详情</a>
        </div>
    </div>
</body>
</html>
